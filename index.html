        <input type="text" id="ov-persona-realestate" value="${escapeHtml(s.personas.realestate.study || '')}" /></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px">
      <button class="btn primary" id="ov-save-setup">Save outreach settings</button>
      <span style="font-size:12.5px;color:var(--muted)">Saving regenerates the built-in drafts. AI-personalized drafts are kept until you re-personalize.</span>
    </div>
  </div>`;
}

function renderOutreach() {
  const wrap = document.getElementById('view-outreach');
  if (!wrap) return;
  let body = '';
  if (ovSection === 'queue') body = ovQueueSectionHtml();
  else if (ovSection === 'followups') body = ovFollowupsSectionHtml();
  else if (ovSection === 'tracking') body = ovTrackingSectionHtml();
  else if (ovSection === 'analytics') body = ovAnalyticsSectionHtml();
  else if (ovSection === 'setup') body = ovSetupSectionHtml();
  wrap.innerHTML = `<div class="ov-wrap">${ovDailyBriefHtml()}${ovDashHtml()}${ovSubtabsHtml()}<div id="ov-body">${body}</div></div>`;
  ovWire();
}

function ovWire() {
  const wrap = document.getElementById('view-outreach');
  if (!wrap) return;
  wrap.querySelectorAll('[data-ov-jump]').forEach(el => el.addEventListener('click', () => { ovSection = el.dataset.ovJump; renderOutreach(); }));
  wrap.querySelectorAll('[data-ov-sub]').forEach(el => el.addEventListener('click', () => { ovSection = el.dataset.ovSub; renderOutreach(); }));
  wrap.querySelectorAll('[data-ov-copy]').forEach(btn => btn.addEventListener('click', () => {
    const ta = document.getElementById(btn.dataset.ovCopy);
    if (ta) ovCopyValue(ta.value, btn);
  }));
  wrap.querySelectorAll('[data-ov-contact]').forEach(btn => btn.addEventListener('click', () => ovMarkContacted(btn.dataset.ovContact)));
  wrap.querySelectorAll('[data-ov-persona]').forEach(sel => sel.addEventListener('change', () => ovSetPersona(sel.dataset.ovPersona, sel.value)));
  wrap.querySelectorAll('[data-ov-channel]').forEach(sel => sel.addEventListener('change', () => ovSetChannel(sel.dataset.ovChannel, sel.value)));
  wrap.querySelectorAll('[data-ov-status]').forEach(btn => btn.addEventListener('click', () => ovApplyStatus(btn.dataset.ovStatus, btn.dataset.ovTo)));
  wrap.querySelectorAll('[data-ov-followup-log]').forEach(btn => btn.addEventListener('click', () => ovLogFollowup(btn.dataset.ovFollowupLog)));
  wrap.querySelectorAll('[data-ov-open]').forEach(btn => btn.addEventListener('click', () => openContactDetail(btn.dataset.ovOpen)));
  wrap.querySelectorAll('[data-ov-open-row]').forEach(tr => tr.addEventListener('click', () => openContactDetail(tr.dataset.ovOpenRow)));
  wrap.querySelectorAll('[data-ov-reactioner]').forEach(btn => btn.addEventListener('click', e => { e.stopPropagation(); ovOpenReactionerFor(btn.dataset.ovReactioner); }));

  const dsCopy = wrap.querySelector('[data-ov-daysheet-copy]');
  if (dsCopy) dsCopy.addEventListener('click', () => ovCopyValue(ovDaysheetText(), dsCopy));
  const dsDl = wrap.querySelector('[data-ov-daysheet-dl]');
  if (dsDl) dsDl.addEventListener('click', ovDownloadDaysheet);
  const brief = wrap.querySelector('[data-ov-brief-dismiss]');
  if (brief) brief.addEventListener('click', () => { ovBriefDismissed = new Date().toISOString().slice(0, 10); renderOutreach(); });

  wrap.querySelectorAll('[data-ov-ai]').forEach(btn => btn.addEventListener('click', async () => {
    const c = (state.contacts || []).find(x => x.id === btn.dataset.ovAi);
    if (!c) return;
    if (!(state.aiSettings && state.aiSettings.apiKey)) { showToast('Add an Anthropic API key in Setup first'); return; }
    const orig = btn.innerHTML; btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Personalizing…';
    try { await ovGenerateAI(c); renderOutreach(); showToast('Personalized with Claude'); }
    catch (err) { alert('Personalization failed: ' + err.message); btn.disabled = false; btn.innerHTML = orig; }
  }));

  const allBtn = wrap.querySelector('[data-ov-ai-all]');
  if (allBtn) allBtn.addEventListener('click', async () => {
    if (!(state.aiSettings && state.aiSettings.apiKey)) { showToast('Add an Anthropic API key in Setup first'); return; }
    const target = (ovSettings().dailyTarget) || 10;
    const batch = ovQueue().slice(0, target);
    if (!batch.length) { showToast('Queue is empty'); return; }
    allBtn.disabled = true;
    let done = 0, failed = 0;
    for (const c of batch) {
      allBtn.innerHTML = `<span class="spinner"></span> Personalizing ${done + 1}/${batch.length}…`;
      try { await ovGenerateAI(c); } catch (e) { failed++; }
      done++;
    }
    renderOutreach();
    showToast(`Personalized ${done - failed}/${batch.length}${failed ? ' (' + failed + ' failed)' : ''}`);
  });

  const saveBtn = wrap.querySelector('#ov-save-setup');
  if (saveBtn) saveBtn.addEventListener('click', () => {
    const s = ovSettings();
    const owner = (document.getElementById('ov-owner').value || '').trim();
    s.ownerName = owner || 'Oli';
    const fd = parseInt(document.getElementById('ov-followup-days').value, 10);
    s.followupDays = (fd >= 1 && fd <= 60) ? fd : 4;
    const dt = parseInt(document.getElementById('ov-daily-target').value, 10);
    s.dailyTarget = (dt >= 1 && dt <= 100) ? dt : 10;
    const sc = parseInt(document.getElementById('ov-send-cap').value, 10);
    s.sendCap = (sc >= 0 && sc <= 200) ? sc : 25;
    const cu = (document.getElementById('ov-persona-culinary').value || '').trim();
    const re = (document.getElementById('ov-persona-realestate').value || '').trim();
    if (cu) s.personas.culinary.study = cu;
    if (re) s.personas.realestate.study = re;
    save();
    ovSection = 'queue';
    renderOutreach();
    showToast('Outreach settings saved');
  });
}

/* Small status badge shown on kanban cards */
function ovKanbanTag(c) {
  const o = c.outreach;
  if (!o || o.status === 'not_contacted') return '';
  if (ovFollowupDue(c)) return `<span class="tag interviews">🔁 Follow-up due</span>`;
  const meta = ovStatusMeta(o.status);
  return `<span class="tag" title="Outreach status">${meta.icon} ${escapeHtml(meta.label)}</span>`;
}

/* ============================================================
   WIRE TOP-LEVEL CONTROLS + INIT
   ============================================================ */
function crmThemeColor(){
  var m = document.querySelector('meta[name="theme-color"]'); if (!m) return;
  var dark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (!dark) { m.setAttribute('content', '#4f46e5'); return; }
  m.setAttribute('content', currentScheme() === 'midnight' ? '#0b1020' : '#0f1411');
}
function applyTheme(t){
  t = (t === 'dark') ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', t);
  var b = document.getElementById('theme-toggle'); if (b) b.textContent = (t === 'dark') ? '☀️' : '🌙';
  crmThemeColor();
  try { localStorage.setItem('crm-theme', t); } catch (e) {}
}
function currentTheme(){ return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light'; }
function currentScheme(){ return document.documentElement.getAttribute('data-scheme') === 'midnight' ? 'midnight' : 'green'; }
function applyScheme(s){
  s = (s === 'midnight') ? 'midnight' : 'green';
  document.documentElement.setAttribute('data-scheme', s);
  var sb = document.getElementById('scheme-toggle');
  if (sb) {
    sb.textContent = (s === 'midnight') ? '🌌 Midnight' : '🌿 Green';
    sb.title = 'Dark color scheme: ' + (s === 'midnight' ? 'Midnight (tap for Green)' : 'Green (tap for Midnight)');
  }
  crmThemeColor();
  try { localStorage.setItem('crm-scheme', s); } catch (e) {}
}
function initTheme(){
  var s = null; try { s = localStorage.getItem('crm-scheme'); } catch (e) {}
  applyScheme(s || 'green');
  var t = null; try { t = localStorage.getItem('crm-theme'); } catch (e) {}
  if (!t) t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  applyTheme(t);
}

function bootApp() {
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => setView(t.dataset.view)));
  const searchInput = document.getElementById('search-input');
  searchInput.value = state.searchQuery || '';
  searchInput.addEventListener('input', e => {
    state.searchQuery = e.target.value; save();
    if (state.activeView !== 'settings') renderFilterBar();
    if (state.activeView === 'pipeline') renderPipeline();
    if (state.activeView === 'list') renderList();
  });
  document.getElementById('quick-add-btn').addEventListener('click', quickAdd);
  document.getElementById('quick-add-input').addEventListener('keydown', e => { if (e.key === 'Enter') quickAdd(); });
  document.getElementById('ai-import-btn').addEventListener('click', openAiImportModal);
  document.getElementById('export-pdf-btn').addEventListener('click', exportPdf);
  document.getElementById('open-reactioner-btn').addEventListener('click', openReactionerHome);
  var _tt = document.getElementById('theme-toggle'); if (_tt) _tt.addEventListener('click', function(){ applyTheme(currentTheme() === 'dark' ? 'light' : 'dark'); });
  var _st = document.getElementById('scheme-toggle'); if (_st) _st.addEventListener('click', function(){ applyScheme(currentScheme() === 'midnight' ? 'green' : 'midnight'); });
  // bulk selection / delete controls
  const bMaster = document.getElementById('bulk-master');
  if (bMaster) bMaster.addEventListener('change', e => selectAllShown(e.target.checked));
  const bClear = document.getElementById('bulk-clear');
  if (bClear) bClear.addEventListener('click', () => { selectedIds.clear(); rerenderContacts(); });
  const bDel = document.getElementById('bulk-delete');
  if (bDel) bDel.addEventListener('click', deleteSelected);
  const bDelAll = document.getElementById('bulk-delete-all');
  if (bDelAll) bDelAll.addEventListener('click', deleteAllContacts);
  setView(state.activeView || 'pipeline');
}

initTheme();
boot();
</script>
