<meta name="description" content="Discovery CRM — track customer-discovery contacts through a pipeline, capture interviews, auto-tag ICPs, and jump straight into a Reactioner interview." />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f5f6fb;
    --panel: #ffffff;
    --text: #1b1d2a;
    --muted: #71758a;
    --border: #e6e8f0;
    --soft: #f7f8fc;
    --accent: #4f46e5;
    --accent-2: #6366f1;
    --accent-soft: #eef2ff;
    --accent-border: #c7d2fe;
    --ink: #312e81;
    --shadow: 0 4px 18px rgba(40,40,90,0.07);
    --shadow-lg: 0 18px 48px rgba(30,30,70,0.22);
    --radius: 14px;
    --ig: #c13584;
    --stage-not-contacted: #94a3b8;
    --stage-contacted: #38bdf8;
    --stage-scheduled: #6366f1;
    --stage-talked-to: #22c55e;
    --stage-unsuitable: #a8a29e;
    --stage-cancelled: #ef4444;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.45; font-size: 14px; -webkit-font-smoothing: antialiased; }
  a { color: var(--accent); }
  .container { max-width: 1440px; margin: 0 auto; padding: 16px 18px 70px; }

  /* ===== TOP BAR ===== */
  .topbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand .logo { width: 38px; height: 38px; border-radius: 11px; background: linear-gradient(135deg, var(--accent-2), var(--accent)); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(79,70,229,0.35); flex-shrink: 0; }
  .brand .logo svg { width: 22px; height: 22px; }
  .brand h1 { margin: 0; font-size: 19px; letter-spacing: -0.3px; }
  .brand .sub { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
  .topbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .sync-pill { font-size: 12px; color: var(--muted); display: inline-flex; align-items: center; gap: 6px; background: var(--panel); border: 1px solid var(--border); padding: 6px 11px; border-radius: 20px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd2e0; flex-shrink: 0; }
  .sync-pill.ok .sync-dot { background: #22c55e; }
  .sync-pill.saving .sync-dot { background: #f59e0b; animation: pulse 1s infinite; }
  .sync-pill.err .sync-dot { background: #ef4444; }
  @keyframes pulse { 50% { opacity: 0.3; } }

  .account { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted); }
  .account .who { font-weight: 600; color: var(--text); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ===== BUTTONS ===== */
  .btn { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text); transition: all 0.12s ease; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; line-height: 1.2; }
  .btn:hover { background: var(--soft); border-color: #d3d7e6; }
  .btn.primary { background: linear-gradient(135deg, var(--accent-2), var(--accent)); color: white; border-color: transparent; box-shadow: 0 3px 10px rgba(79,70,229,0.28); }
  .btn.primary:hover { filter: brightness(1.06); background: linear-gradient(135deg, var(--accent-2), var(--accent)); }
  .btn.ai { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; border-color: transparent; }
  .btn.ai:hover { filter: brightness(1.06); }
  .btn.danger { color: #dc2626; border-color: #f3c9c9; background: var(--surface); }
  .btn.danger:hover { background: #fef2f2; }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--muted); }
  .btn.ghost:hover { background: var(--soft); color: var(--text); }
  .btn.tiny { padding: 5px 9px; font-size: 12px; border-radius: 8px; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

  /* ===== QUICK ADD ===== */
  .quick-add { display: flex; gap: 8px; align-items: center; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; box-shadow: var(--shadow); margin-bottom: 12px; flex-wrap: wrap; }
  .quick-add .qa-icon { font-size: 17px; }
  .quick-add input.qa-input { flex: 1; min-width: 220px; border: none; outline: none; font-size: 14px; padding: 6px 4px; background: transparent; }
  .quick-add .qa-hint { font-size: 11px; color: var(--muted); width: 100%; margin: -2px 0 0 30px; }
  .quick-add .qa-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  .search-box { padding: 8px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; width: 230px; background: var(--surface); }

  select, input[type="text"], input[type="email"], input[type="tel"], input[type="date"], input[type="url"], input[type="password"], textarea {
    padding: 9px 11px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); width: 100%; }
  select:focus, input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  textarea { resize: vertical; }
  label.field-label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }

  /* ===== TABS ===== */
  .tabs { display: flex; gap: 4px; background: var(--panel); padding: 6px; border-radius: 14px; box-shadow: var(--shadow); margin-bottom: 12px; overflow-x: auto; }
  .tab { padding: 9px 17px; border-radius: 10px; border: none; background: transparent; color: var(--muted); font-weight: 600; cursor: pointer; font-size: 14px; white-space: nowrap; }
  .tab.active { background: linear-gradient(135deg, var(--accent-2), var(--accent)); color: white; box-shadow: 0 3px 10px rgba(79,70,229,0.28); }
  .tab:hover:not(.active) { background: var(--soft); color: var(--text); }

  /* ===== FILTER BAR ===== */
  .filter-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; background: var(--panel); padding: 10px 12px; border-radius: 14px; box-shadow: var(--shadow); margin-bottom: 14px; }
  .filter-bar .filter-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .filter-bar select { width: auto; font-size: 12.5px; padding: 7px 9px; }
  .filter-chip { padding: 6px 11px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 12.5px; font-weight: 600; color: var(--muted); }
  .filter-chip:hover { background: var(--soft); }
  .filter-chip.active { background: var(--accent-soft); border-color: var(--accent-border); color: var(--ink); }
  .filter-count { margin-left: auto; font-size: 12.5px; color: var(--muted); }

  /* ===== LINKS ON CARDS ===== */
  .contact-link { text-decoration: none; font-weight: 600; font-size: 12px; display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 9px; border: 1px solid transparent; }
  .contact-link.ig { color: var(--ig); background: #fdf0f8; border-color: #f6d6ec; }
  .contact-link.email { color: #1d6fb8; background: #eaf4ff; border-color: #cfe5fb; }
  .contact-link.phone { color: #15803d; background: #ecfdf3; border-color: #c9f0d6; }
  .contact-link:hover { filter: brightness(0.97); text-decoration: none; }

  /* ===== PIPELINE ===== */
  .kanban { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; min-height: 60vh; align-items: start; }
  .kanban-col { background: var(--panel); border-radius: 14px; padding: 12px; box-shadow: var(--shadow); display: flex; flex-direction: column; min-height: 220px; }
  .kanban-col h3 { margin: 0 0 10px; font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
  .kanban-col h3 .stage-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .kanban-col h3 .count { margin-left: auto; background: var(--soft); border-radius: 10px; padding: 1px 9px; font-size: 12px; color: var(--text); }
  .kanban-cards { display: flex; flex-direction: column; gap: 9px; overflow-y: auto; min-height: 60px; }
  .contact-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; cursor: grab; transition: all 0.12s ease; user-select: none; position: relative; }
  .contact-card:hover { border-color: var(--accent-border); box-shadow: 0 4px 14px rgba(79,70,229,0.12); transform: translateY(-1px); }
  .contact-card.dragging { opacity: 0.4; transform: rotate(-1.5deg) scale(0.98); }
  .kanban-col.drop-target { background: var(--accent-soft); outline: 2px dashed var(--accent); outline-offset: -4px; }
  .kanban-col.drop-target h3 { color: var(--ink); }
  .contact-card .name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
  .contact-card .company { font-size: 12px; color: var(--muted); margin-bottom: 7px; }
  .contact-card .links { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
  .contact-card .meta { display: flex; flex-wrap: wrap; gap: 4px; }
  .contact-card .tag { font-size: 10px; background: var(--accent-soft); border: 1px solid var(--accent-border); padding: 2px 7px; border-radius: 10px; color: var(--ink); font-weight: 600; }
  .contact-card .tag.interviews { background: #fff7e6; border-color: #f5d98a; color: #92660a; }
  .card-del { position: absolute; top: 6px; right: 6px; opacity: 0; border: none; background: #fef2f2; color: #dc2626; border-radius: 7px; width: 22px; height: 22px; cursor: pointer; font-size: 13px; line-height: 1; transition: opacity 0.12s; }
  .contact-card:hover .card-del { opacity: 1; }
  .card-del:hover { background: #fee2e2; }

  /* ===== LIST ===== */
  .list-table-wrap { background: var(--surface); border-radius: 14px; box-shadow: var(--shadow); overflow: auto; }
  table.list { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.list th, table.list td { padding: 11px 13px; text-align: left; border-bottom: 1px solid var(--border); }
  table.list th { background: var(--soft); font-weight: 800; color: var(--muted); text-transform: uppercase; font-size: 10.5px; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 1; }
  table.list tbody tr { cursor: pointer; }
  table.list tbody tr:hover { background: var(--accent-soft); }
  table.list .stage-pill { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 700; color: white; }

  /* ===== SETTINGS ===== */
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .settings-grid .panel { background: var(--panel); border-radius: 14px; padding: 18px; box-shadow: var(--shadow); }
  .settings-grid h3 { margin-top: 0; font-size: 15px; }
  .panel.span { grid-column: 1 / -1; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag-list .item { background: var(--soft); border: 1px solid var(--border); padding: 4px 10px; border-radius: 14px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
  .tag-list .item button { background: none; border: none; cursor: pointer; color: var(--muted); padding: 0; font-size: 14px; line-height: 1; }
  .tag-list .item button:hover { color: #dc2626; }

  /* ===== MODAL ===== */
  .modal-back { position: fixed; inset: 0; background: rgba(20,22,40,0.5); backdrop-filter: blur(2px); display: none; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
  .modal-back.show { display: flex; }
  .modal { background: var(--surface); padding: 0; border-radius: 16px; max-width: 900px; width: 100%; max-height: 92vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); }
  .modal-header { padding: 17px 22px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .modal-header h2 { margin: 0; font-size: 18px; }
  .modal-body { padding: 18px 22px; overflow-y: auto; flex: 1; }
  .modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 6px; flex-wrap: wrap; }

  .contact-actions { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px dashed var(--border); }

  .contact-detail-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
  .contact-detail-tabs button { padding: 9px 14px; border: none; background: transparent; cursor: pointer; font-weight: 600; color: var(--muted); border-bottom: 2px solid transparent; font-size: 13px; }
  .contact-detail-tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.single { grid-template-columns: 1fr; }
  .form-field { display: flex; flex-direction: column; gap: 4px; }
  .input-with-action { display: flex; gap: 6px; align-items: center; }

  .multiselect { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px; border: 1px solid var(--border); border-radius: 10px; min-height: 42px; }
  .multiselect .item { background: var(--accent-soft); border: 1px solid var(--accent-border); color: var(--ink); padding: 2px 8px; border-radius: 12px; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; }
  .multiselect .item button { background: none; border: none; cursor: pointer; color: var(--ink); padding: 0; line-height: 1; }
  .multiselect select { width: auto; border: none; outline: none; padding: 4px 8px; flex: 1; min-width: 130px; box-shadow: none; }

  .interview-card { background: var(--soft); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
  .interview-card.reactioner { border-color: #f5d98a; background: #fffdf6; }
  .interview-card-head { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .interview-card-head h4 { margin: 0; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .iv-badge { font-size: 9.5px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 8px; background: #fff7e6; color: #92660a; border: 1px solid #f5d98a; }
  .interview-fields { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .transcript-area { min-height: 120px; font-size: 13px; line-height: 1.5; }
  .transcript-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
  .transcript-controls .char-count { margin-left: auto; }
  .rxn-row { display: flex; gap: 6px; align-items: end; }
  .rxn-row .field-grow { flex: 1; }

  .reaction-summary { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; background: var(--surface); border: 1px solid #ead9ad; border-radius: 10px; padding: 10px 13px; font-size: 13px; }
  .reaction-summary .big { font-size: 16px; font-weight: 800; }
  .reaction-summary .verdict { margin-left: auto; font-weight: 700; padding: 3px 10px; border-radius: 10px; }
  .verdict.win { background: #ecfdf3; color: #15803d; }
  .verdict.mixed { background: #fff7e6; color: #92660a; }
  .verdict.lose { background: #fef2f2; color: #dc2626; }

  .empty-state { padding: 48px; text-align: center; color: var(--muted); font-size: 14px; }
  .empty-state h3 { color: var(--text); margin-bottom: 8px; }
  .empty-state .big-icon { font-size: 40px; margin-bottom: 8px; }

  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1b1d2a; color: white; padding: 11px 20px; border-radius: 10px; font-size: 14px; opacity: 0; transition: all 0.25s ease; pointer-events: none; z-index: 200; box-shadow: var(--shadow-lg); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: currentColor; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .extract-btn { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; border: none; padding: 8px 14px; border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .extract-btn:hover { filter: brightness(1.06); }
  .extract-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .extract-result { background: #f5f3ff; border: 1px solid #c4b5fd; border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; }
  .extract-result h4 { margin: 0 0 6px; font-size: 13px; color: #5b21b6; text-transform: uppercase; letter-spacing: 0.4px; display: flex; align-items: center; gap: 6px; }
  .extract-result .section-note { font-size: 12px; color: var(--muted); margin: 0 0 8px; font-style: italic; }
  .extract-result ul { margin: 0 0 14px; padding-left: 22px; font-size: 13px; line-height: 1.55; }
  .extract-result .validated-pain { background: var(--surface); border: 1px solid #d6d0f5; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .extract-result .validated-pain .pain-head { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
  .extract-result .validated-pain .pain-text { font-weight: 600; flex: 1; min-width: 200px; }
  .extract-result .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; }
  .badge-strong { background: #d4edda; color: #1e5631; }
  .badge-medium { background: #fff3cd; color: #856404; }
  .badge-weak { background: #f1f3f5; color: #555; }
  .extract-result .evidence { font-size: 12px; color: var(--muted); margin-top: 6px; padding-left: 8px; border-left: 2px solid #c4b5fd; }
  .extract-result .signals { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .extract-result .signal-tag { font-size: 10px; padding: 1px 7px; border-radius: 8px; background: #ede7ff; color: #5b21b6; font-weight: 600; }
  .extract-result.red-flags-panel { background: #fff5f5; border-color: #f5b7b1; }
  .extract-result.red-flags-panel h4 { color: #c62828; }

/* ===== theme tokens, dark (green) mode, bottom-right status, mobile ===== */
:root { --surface: #ffffff; }

[data-theme="dark"] {

}

/* dark-mode legibility fixes for cards that hardcoded light backgrounds */

/* ===== Midnight scheme (deep indigo) — overrides Green when data-scheme="midnight" ===== */
[data-theme="dark"][data-scheme="midnight"] {
  --bg: #0b1020; --panel: #131a2e; --surface: #131a2e; --text: #e6eaf5; --muted: #8b95b2;
  --border: #283250; --soft: #161e36;
  --accent: #6366f1; --accent-2: #818cf8; --accent-soft: #1e2547; --accent-border: #3a4675; --ink: #c7d2fe;

}

[data-theme="dark"][data-scheme="midnight"] .tab.active { color: #ffffff; }

@media print { :root, [data-theme="dark"] { --surface: #ffffff; } }

/* ===== bulk select + drag-to-delete ===== */
.bulk-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 0 0 12px; padding: 8px 12px; background: var(--accent-soft); border: 1px solid var(--accent-border); border-radius: 11px; font-size: 13px; }

@media (max-width: 560px) { .delete-zone { width: 68px; font-size: 10.5px; } .delete-zone .dz-icon { font-size: 24px; } }

<script>
/* ============================================================
   SUPABASE CONFIG  —  shared with the Reactioner for cohesion.
   The anon key is designed to be public; Row Level Security
   protects each account's data. The CRM uses its own table
   (crm_state) and reads the Reactioner's table (interview_state).
   ============================================================ */
const SUPABASE_URL = 'https://nxbasaeysxarbavomjha.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54YmFzYWV5c3hhcmJhdm9tamhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTk3MjcsImV4cCI6MjA5NTU3NTcyN30.qfIbEZ2S2cpwQZKQQ2uM3_I6c5CVaj4-JhN-E1bgeB0';
const CRM_TABLE = 'crm_state';
const REACTIONER_TABLE = 'interview_state';

function cloudConfigured() {
  return typeof SUPABASE_URL === 'string'
      && SUPABASE_URL.indexOf('YOUR_') === -1
      && /^https:\/\/.+/.test(SUPABASE_URL)
      && typeof SUPABASE_ANON_KEY === 'string'
      && SUPABASE_ANON_KEY.indexOf('YOUR_') === -1
      && SUPABASE_ANON_KEY.length > 20;
}
const sb = (cloudConfigured() && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    })
  : null;

let currentUserId = null;
let cloudUpdatedAt = null;
let cloudTableMissing = false;
let appStarted = false;

/* ============================================================
   DATA MODEL & STORAGE
   ============================================================ */
const LEGACY_KEY = 'culinary-crm-v1';
function localCacheKey() { return currentUserId ? 'discovery-crm:' + currentUserId : LEGACY_KEY; }

const DEFAULT_STAGES = [
  { id: 'not-contacted', label: 'Not contacted', color: 'var(--stage-not-contacted)' },
  { id: 'contacted',     label: 'Contacted',     color: 'var(--stage-contacted)' },
  { id: 'scheduled',     label: 'Scheduled',     color: 'var(--stage-scheduled)' },
  { id: 'talked-to',     label: 'Talked to',     color: 'var(--stage-talked-to)' },
  { id: 'unsuitable',    label: 'Unsuitable',    color: 'var(--stage-unsuitable)' },
  { id: 'cancelled',     label: 'Cancelled',     color: 'var(--stage-cancelled)' },
];

const DEFAULT_SEGMENTS = ['Food Truck Owner', 'Caterer', 'Hybrid (Truck + Catering)', 'Restaurant Owner', 'Broker', 'Other'];
const DEFAULT_SOURCES = ['Personal Network', 'Cold Outreach', 'Referral', 'Event / Rally', 'Association (RDUFTA / CLTFTA)', 'Instagram', 'LinkedIn'];
const DEFAULT_APPROACH = ['Text message', 'Phone call', 'Email', 'Direct message (IG/FB)', 'In-person (event)', 'In-person (walk-up)'];

function uid() { return 'c-' + Math.random().toString(36).slice(2, 10); }

function defaultContact() {
  return {
    id: uid(), name: '', company: '', role: '', phone: '', email: '', instagram: '',
    segments: [], source: '', approachMethod: '', stage: 'not-contacted',
    createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
    nextFollowup: '', notes: '', interviews: [], outreach: defaultOutreach()
  };
}
function defaultInterview() {
  return {
    id: uid(), date: new Date().toISOString().slice(0, 10), painPoints: '', language: '',
    nextSteps: '', transcript: '', recordingUrl: '', validationRxn: '', notes: '',
    source: '', reactionSummary: null
  };
}
function defaultFilters() {
  return { segment: '', stage: '', source: '', hasEmail: false, hasPhone: false, hasInstagram: false };
}
function defaultIntegration() { return { reactionerUrl: '' }; }
function defaultState() {
  return {
    contacts: [], segments: [...DEFAULT_SEGMENTS], sources: [...DEFAULT_SOURCES],
    approachMethods: [...DEFAULT_APPROACH], activeView: 'pipeline', searchQuery: '',
    filters: defaultFilters(), integration: defaultIntegration(),
    outreachSettings: defaultOutreachSettings(),
    aiSettings: { apiKey: '', model: 'claude-haiku-4-5-20251001' }
  };
}
function migrate(s) {
  if (!s || typeof s !== 'object') return defaultState();
  if (!Array.isArray(s.contacts)) s.contacts = [];
  if (!s.segments) s.segments = [...DEFAULT_SEGMENTS];
  if (!s.sources) s.sources = [...DEFAULT_SOURCES];
  if (!s.approachMethods) s.approachMethods = [...DEFAULT_APPROACH];
  if (!s.aiSettings) s.aiSettings = { apiKey: '', model: 'claude-haiku-4-5-20251001' };
  if (!s.integration) s.integration = defaultIntegration();
  if (!s.outreachSettings) s.outreachSettings = defaultOutreachSettings();
  s.contacts.forEach(function (c) { if (!c.outreach || typeof c.outreach !== 'object') c.outreach = defaultOutreach(); });
  s.filters = Object.assign(defaultFilters(), s.filters || {});
  return s;
}
function readCache(key) {
  try { const raw = localStorage.getItem(key); return raw ? migrate(JSON.parse(raw)) : null; } catch (e) { return null; }
}

let state = readCache(LEGACY_KEY) || defaultState();

/* ---- saving ---- */
let cloudSaveTimer = null;
let pendingSave = false;
let refreshing = false;
function save() {
  try { localStorage.setItem(localCacheKey(), JSON.stringify(state)); } catch (e) {}
  updateContactCount();
  scheduleCloudSave();
}
function scheduleCloudSave() {
  if (!sb || !currentUserId || cloudTableMissing) return;
  pendingSave = true;
  setSyncStatus('saving', 'Saving…');
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(function () { cloudSaveTimer = null; cloudSaveNow(); }, 800);
}
function isMissingTable(e) {
  const m = ((e && (e.message || e.hint || e.code || e.details)) || '').toString().toLowerCase();
  return m.includes('crm_state') || m.includes('does not exist') || m.includes('schema cache')
      || m.includes('42p01') || m.includes('could not find the table');
}
async function cloudSaveNow() {
  if (!sb || !currentUserId || cloudTableMissing) return;
  const now = new Date().toISOString();
  try {
    const { error } = await sb.from(CRM_TABLE).upsert({ user_id: currentUserId, data: state, updated_at: now }, { onConflict: 'user_id' });
    if (error) throw error;
    cloudUpdatedAt = now;
    pendingSave = false;
    setSyncStatus('ok', 'Synced');
  } catch (e) {
    if (isMissingTable(e)) { cloudTableMissing = true; pendingSave = false; setSyncStatus('err', 'Cloud table not set up'); return; }
    setSyncStatus('err', 'Offline — saved locally');
    clearTimeout(cloudSaveTimer);
    cloudSaveTimer = setTimeout(cloudSaveNow, 5000);
  }
}
async function cloudLoad(uidArg) {
  const { data, error } = await sb.from(CRM_TABLE).select('data,updated_at').eq('user_id', uidArg).maybeSingle();
  if (error) throw error;
  return data;
}
async function cloudLoadReactioner(uidArg) {
  const { data, error } = await sb.from(REACTIONER_TABLE).select('data,updated_at').eq('user_id', uidArg).maybeSingle();
  if (error) throw error;
  return data;
}

function setSyncStatus(kind, text) {
  const pill = document.getElementById('sync-pill');
  const t = document.getElementById('sync-text');
  if (!pill || !t) return;
  pill.classList.remove('ok', 'saving', 'err');
  if (kind) pill.classList.add(kind);
  t.textContent = text;
}
function updateContactCount() { /* count shown in filter bar */ }

/* ============================================================
   AUTH
   ============================================================ */
function buildAuthGate() {
  const gate = document.getElementById('auth-gate');
  gate.innerHTML = `
    <div class="auth-card">
      <div class="auth-logo"><svg viewBox="0 0 64 64" width="28" height="28" xmlns="http://www.w3.org/2000/svg"><rect x="19" y="14" width="26" height="36" rx="4" fill="#ffffff"/><rect x="26" y="10" width="12" height="8" rx="2.5" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/><circle cx="27" cy="27" r="2.3" fill="#4f46e5"/><circle cx="27" cy="36" r="2.3" fill="#4f46e5"/></svg></div>
      <h2>Discovery CRM</h2>
      <p class="auth-sub">Sign in to sync your contacts across devices.</p>
      <form id="auth-form" autocomplete="on">
        <input id="auth-email" type="email" required placeholder="you@example.com" autocomplete="email" />
        <input id="auth-password" type="password" required minlength="6" placeholder="Password (min 6 characters)" autocomplete="current-password" />
        <div class="auth-row">
          <button class="btn primary" id="auth-signin" type="submit">Sign in</button>
          <button class="btn" id="auth-signup" type="button">Create account</button>
        </div>
        <button class="link-btn" id="auth-reset" type="button">Forgot password?</button>
        <div class="auth-msg" id="auth-msg"></div>
      </form>
      <div class="auth-foot"><button class="link-btn" id="auth-local">Use without an account (this device only)</button></div>
    </div>`;
  const emailInput = gate.querySelector('#auth-email');
  const pwInput = gate.querySelector('#auth-password');
  const msg = gate.querySelector('#auth-msg');
  const setErr = (m) => { msg.className = 'auth-msg err'; msg.textContent = m; };
  const setOk = (m) => { msg.className = 'auth-msg ok'; msg.textContent = m; };

  gate.querySelector('#auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim(); const password = pwInput.value;
    if (!email || !password || !sb) return;
    setOk('Signing in…');
    try {
      const res = await sb.auth.signInWithPassword({ email, password });
      if (res.error) throw res.error;
    } catch (err) { setErr('Wrong email or password. New here? Click Create account.'); }
  });
  gate.querySelector('#auth-signup').addEventListener('click', async () => {
    const email = emailInput.value.trim(); const password = pwInput.value;
    if (!email) { setErr('Enter an email first.'); return; }
    if (!password || password.length < 6) { setErr('Pick a password of at least 6 characters.'); return; }
    setOk('Creating account…');
    try {
      const res = await sb.auth.signUp({ email, password, options: { emailRedirectTo: window.location.origin + window.location.pathname } });
      if (res.error) throw res.error;
      if (res.data && res.data.session) { /* onAuthStateChange handles it */ }
      else setOk('Account created. If asked, check your inbox to confirm, then sign in.');
    } catch (err) {
      const m = (err && err.message || '').toLowerCase();
      if (m.includes('already')) setErr('That email already has an account. Use Sign in or Forgot password.');
      else setErr('Could not create account: ' + (err.message || 'unknown error'));
    }
  });
  gate.querySelector('#auth-reset').addEventListener('click', async () => {
    const email = emailInput.value.trim();
    if (!email) { setErr('Enter your email above first, then click Forgot password.'); return; }
    try {
      const res = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + window.location.pathname });
      if (res.error) throw res.error;
      setOk('Check your inbox — we sent a reset link to ' + email + '.');
    } catch (err) { setErr('Could not send reset email: ' + (err.message || 'unknown error')); }
  });
  gate.querySelector('#auth-local').addEventListener('click', () => {
    hideAuthGate(); startLocalOnly();
  });
  return gate;
}
function showAuthGate() { const g = document.getElementById('auth-gate'); g.style.display = 'flex'; document.getElementById('app-container').style.display = 'none'; }
function hideAuthGate() { const g = document.getElementById('auth-gate'); g.style.display = 'none'; document.getElementById('app-container').style.display = ''; }

function buildAccountWidget(email) {
  const w = document.getElementById('account-widget');
  if (!w) return;
  w.innerHTML = `<span class="who" title="${escapeHtml(email)}">${escapeHtml(email)}</span><button class="btn tiny ghost" id="sign-out-btn">Sign out</button>`;
  const b = document.getElementById('sign-out-btn');
  if (b) b.addEventListener('click', async () => { try { if (sb) await sb.auth.signOut(); } catch (e) {} location.reload(); });
}

async function loadUserState(uidArg) {
  const cached = readCache(localCacheKey());
  if (cached) state = cached;
  let row = null;
  try { row = await cloudLoad(uidArg); }
  catch (e) { if (isMissingTable(e)) cloudTableMissing = true; }
  if (row && row.data && Array.isArray(row.data.contacts)) {
    state = migrate(row.data);
    cloudUpdatedAt = row.updated_at;
    try { localStorage.setItem(localCacheKey(), JSON.stringify(state)); } catch (e) {}
  } else {
    // No cloud data for this account yet — offer to bring in legacy/local data.
    const legacy = readCache(LEGACY_KEY);
    const localHas = state.contacts && state.contacts.length;
    if (!localHas && legacy && legacy.contacts && legacy.contacts.length) {
      if (confirm('Bring the ' + legacy.contacts.length + ' contact(s) already saved in this browser into your account?')) {
        state = legacy;
      }
    }
    if (!cloudTableMissing) await cloudSaveNow();
  }
}
async function onSignedIn(session) {
  if (appStarted) return;
  appStarted = true;
  currentUserId = session.user.id;
  hideAuthGate();
  buildAccountWidget(session.user.email);
  setSyncStatus('saving', 'Loading…');
  await loadUserState(currentUserId);
  setSyncStatus(cloudTableMissing ? 'err' : 'ok', cloudTableMissing ? 'Cloud table not set up' : 'Synced');
  bootApp();
  startFocusRefresh();
}
function startLocalOnly() {
  if (appStarted) return;
  appStarted = true;
  setSyncStatus('', 'This device only');
  bootApp();
}
async function refreshFromCloud() {
  if (!sb || !currentUserId || cloudTableMissing) return;
  if (pendingSave || refreshing) return; // never clobber unsaved local changes
  refreshing = true;
  try {
    const row = await cloudLoad(currentUserId);
    if (pendingSave) return; // a local change landed while fetching
    if (row && row.updated_at && row.updated_at !== cloudUpdatedAt && (!cloudUpdatedAt || row.updated_at > cloudUpdatedAt) && row.data && Array.isArray(row.data.contacts)) {
      state = migrate(row.data); cloudUpdatedAt = row.updated_at;
      try { localStorage.setItem(localCacheKey(), JSON.stringify(state)); } catch (e) {}
      const modalOpen = document.getElementById('modal-back').classList.contains('show');
      if (!modalOpen) setView(state.activeView || 'pipeline');
      setSyncStatus('ok', 'Synced — updated');
    }
  } catch (e) {} finally { refreshing = false; }
}
function startFocusRefresh() {
  document.addEventListener('visibilitychange', () => { if (!document.hidden) refreshFromCloud(); });
  window.addEventListener('focus', refreshFromCloud);
}
async function handlePasswordRecovery() {
  const newPw = window.prompt('Enter a new password (at least 6 characters):');
  if (newPw == null) { try { if (sb) await sb.auth.signOut(); } catch (e) {} location.reload(); return; }
  if (newPw.length < 6) { window.alert('Password must be at least 6 characters.'); return handlePasswordRecovery(); }
  try { const res = await sb.auth.updateUser({ password: newPw }); if (res.error) throw res.error; window.alert('Password updated.'); location.reload(); }
  catch (err) { window.alert('Could not update password: ' + (err.message || 'unknown error')); }
}

/* ---- entry point ---- */
function boot() {
  if (!cloudConfigured() || !window.supabase || !sb) { startLocalOnly(); return; }
  buildAuthGate();
  showAuthGate();
  sb.auth.getSession().then((r) => { if (r && r.data && r.data.session) onSignedIn(r.data.session); });
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') { handlePasswordRecovery(); return; }
    if (session) onSignedIn(session);
    else if (appStarted) location.reload();
  });
}

/* ============================================================
   HELPERS
   ============================================================ */
function getStage(id) { return DEFAULT_STAGES.find(s => s.id === id) || DEFAULT_STAGES[0]; }
function escapeHtml(s) { if (s === null || s === undefined) return ''; return String(s).replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch])); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }

function igHandle(raw) {
  if (!raw) return '';
  let h = String(raw).trim();
  h = h.replace(/^https?:\/\//i, '');
  h = h.replace(/^(www\.)?instagram\.com\//i, '');
  h = h.replace(/[/?#].*$/, '');
  h = h.replace(/^@+/, '');
  return h.trim();
}
function igUrl(raw) { const h = igHandle(raw); return h ? 'https://instagram.com/' + h : ''; }
function telHref(raw) { return String(raw || '').replace(/[^\d+]/g, ''); }
function igChip(c) { const h = igHandle(c.instagram); return h ? `<a href="${igUrl(c.instagram)}" target="_blank" rel="noopener" class="contact-link ig" onclick="event.stopPropagation()">📷 @${escapeHtml(h)}</a>` : ''; }
function emailChip(c) { const e = (c.email || '').trim(); return e ? `<a href="mailto:${escapeHtml(e)}" class="contact-link email" onclick="event.stopPropagation()">✉ ${escapeHtml(e)}</a>` : ''; }
function phoneChip(c) { const p = (c.phone || '').trim(); return p ? `<a href="tel:${escapeHtml(telHref(p))}" class="contact-link phone" onclick="event.stopPropagation()">📞 ${escapeHtml(p)}</a>` : ''; }

/* ============================================================
   FILTERS
   ============================================================ */
function filteredContacts() {
  const q = (state.searchQuery || '').toLowerCase().trim();
  const f = state.filters || defaultFilters();
  return state.contacts.filter(c => {
    if (q) {
      const hay = (c.name + ' ' + c.company + ' ' + c.role + ' ' + (c.segments || []).join(' ') + ' ' + (c.instagram || '') + ' ' + (c.email || '') + ' ' + (c.phone || '') + ' ' + (c.notes || '')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (f.segment && !(c.segments || []).includes(f.segment)) return false;
    if (f.stage && c.stage !== f.stage) return false;
    if (f.source && c.source !== f.source) return false;
    if (f.hasEmail && !(c.email || '').trim()) return false;
    if (f.hasPhone && !(c.phone || '').trim()) return false;
    if (f.hasInstagram && !igHandle(c.instagram)) return false;
    return true;
  });
}
function filtersActive() {
  const f = state.filters || {};
  return !!(f.segment || f.stage || f.source || f.hasEmail || f.hasPhone || f.hasInstagram);
}

/* ============================================================
   VIEW SWITCHING
   ============================================================ */
const VIEWS = ['pipeline', 'outreach', 'list', 'settings'];
function setView(v) {
  state.activeView = v; save();
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  VIEWS.forEach(name => { const el = document.getElementById('view-' + name); if (el) el.style.display = (name === v) ? '' : 'none'; });
  const fb = document.getElementById('filter-bar');
  if (fb) fb.style.display = (v === 'settings' || v === 'outreach') ? 'none' : '';
  if (v !== 'settings' && v !== 'outreach') renderFilterBar();
  if (v === 'pipeline') renderPipeline();
  if (v === 'outreach') renderOutreach();
  if (v === 'list') renderList();
  if (v === 'settings') renderSettings();
  updateBulkBar();
}

/* ============================================================
   FILTER BAR
   ============================================================ */
function renderFilterBar() {
  const bar = document.getElementById('filter-bar');
  if (!bar) return;
  const f = state.filters || defaultFilters();
  const segOpts = '<option value="">All ICP segments</option>' + state.segments.map(s => `<option value="${escapeHtml(s)}" ${f.segment === s ? 'selected' : ''}>${escapeHtml(s)}</option>`).join('');
  const stageOpts = '<option value="">All stages</option>' + DEFAULT_STAGES.map(s => `<option value="${s.id}" ${f.stage === s.id ? 'selected' : ''}>${escapeHtml(s.label)}</option>`).join('');
  const srcOpts = '<option value="">All sources</option>' + state.sources.map(s => `<option value="${escapeHtml(s)}" ${f.source === s ? 'selected' : ''}>${escapeHtml(s)}</option>`).join('');
  const active = filtersActive();
  const total = (state.contacts || []).length;
  const shown = filteredContacts().length;

function renderPipeline() {

    const stageContacts = contacts.filter(c => c.stage === stage.id);

    if (stageContacts.length === 0) {
      html += `<div style="color:var(--muted);font-size:12px;padding:8px 0;font-style:italic">Drop a card here</div>`;
    } else {
      for (const c of stageContacts) {
        const interviewCount = (c.interviews || []).length;
        const segs = (c.segments || []).slice(0, 2);
        const links = [igChip(c), emailChip(c), phoneChip(c)].filter(Boolean).join('');
        html += `<div class="contact-card ${selectedIds.has(c.id) ? 'selected' : ''}" data-id="${c.id}" draggable="true" title="Drag to move • drag left to delete • click to open">

          <button class="card-del" data-del="${c.id}" title="Delete contact">🗑</button>
          <div class="name">${escapeHtml(c.name || '(Unnamed)')}</div>
          ${c.company ? `<div class="company">${escapeHtml(c.company)}${c.role ? ' · ' + escapeHtml(c.role) : ''}</div>` : (c.role ? `<div class="company">${escapeHtml(c.role)}</div>` : '')}
          ${links ? `<div class="links">${links}</div>` : ''}
          <div class="meta">
            ${segs.map(s => `<span class="tag">${escapeHtml(s)}</span>`).join('')}
            ${interviewCount > 0 ? `<span class="tag interviews">📝 ${interviewCount} interview${interviewCount === 1 ? '' : 's'}</span>` : ''}
            ${ovKanbanTag(c)}
          </div>
        </div>`;
      }
    }
    html += `</div></div>`;
  }
  html += '</div>';
  wrap.innerHTML = html;

  let dragMoved = false;
  wireDeleteZone();
  wrap.querySelectorAll('.card-del').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    deleteContact(b.dataset.del);
  }));
  wrap.querySelectorAll('.card-select').forEach(cb => {
    cb.addEventListener('click', e => e.stopPropagation());
    cb.addEventListener('change', e => { e.stopPropagation(); toggleSelect(cb.dataset.sel, cb.checked); });
  });
  wrap.querySelectorAll('.contact-card').forEach(card => {
    card.addEventListener('click', () => { if (dragMoved) { dragMoved = false; return; } openContactDetail(card.dataset.id); });
    card.addEventListener('dragstart', e => { dragMoved = true; e.dataTransfer.setData('text/plain', card.dataset.id); e.dataTransfer.effectAllowed = 'move'; card.classList.add('dragging'); showDeleteZone(true); });
    card.addEventListener('dragend', () => { card.classList.remove('dragging'); showDeleteZone(false); wrap.querySelectorAll('.kanban-col.drop-target').forEach(c => c.classList.remove('drop-target')); setTimeout(() => { dragMoved = false; }, 50); });
  });
  updateBulkBar();
  wrap.querySelectorAll('.kanban-col').forEach(col => {
    col.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; col.classList.add('drop-target'); });
    col.addEventListener('dragleave', e => { if (!col.contains(e.relatedTarget)) col.classList.remove('drop-target'); });
    col.addEventListener('drop', e => {
      e.preventDefault(); col.classList.remove('drop-target');
      const id = e.dataTransfer.getData('text/plain'); const newStage = col.dataset.stage;
      const contact = state.contacts.find(x => x.id === id);
      if (contact && contact.stage !== newStage) { contact.stage = newStage; contact.updatedAt = new Date().toISOString(); save(); renderPipeline(); showToast(`Moved to "${getStage(newStage).label}"`); }
    });
  });
}

function deleteContact(id) {
  const c = state.contacts.find(x => x.id === id);
  if (!c) return;
  if (!confirm(`Delete ${c.name || 'this contact'} and all their interviews?`)) return;
  state.contacts = state.contacts.filter(x => x.id !== id);
  selectedIds.delete(id);
  save();
  rerenderContacts();
  showToast('Contact deleted');
}

/* ============================================================
   SELECTION + BULK DELETE
   ============================================================ */
const selectedIds = new Set();

function rerenderContacts() {
  if (state.activeView === 'pipeline') renderPipeline();
  if (state.activeView === 'list') renderList();
  renderFilterBar();
  updateBulkBar();
}

function toggleSelect(id, on) {
  if (on) selectedIds.add(id); else selectedIds.delete(id);
  // reflect on currently rendered card / row without a full re-render
  document.querySelectorAll(`[data-id="${CSS.escape(id)}"]`).forEach(el => {
    if (el.classList.contains('contact-card') || el.tagName === 'TR') el.classList.toggle('selected', on);
  });
  updateBulkBar();
}

function updateBulkBar() {
  const bar = document.getElementById('bulk-bar');
  if (!bar) return;
  // prune ids that no longer exist
  const liveIds = new Set((state.contacts || []).map(c => c.id));
  for (const id of [...selectedIds]) if (!liveIds.has(id)) selectedIds.delete(id);

  const shown = filteredContacts();
  const total = (state.contacts || []).length;
  const n = selectedIds.size;
  // Show the bar whenever there are contacts to act on, or a selection is active
  bar.style.display = (state.activeView === 'settings' || state.activeView === 'outreach' || total === 0) ? 'none' : 'flex';

  const countText = document.getElementById('bulk-count-text');
  if (countText) countText.textContent = n > 0 ? `${n} selected` : 'Select';
  const master = document.getElementById('bulk-master');
  if (master) {
    const shownSelected = shown.filter(c => selectedIds.has(c.id)).length;
    master.checked = shown.length > 0 && shownSelected === shown.length;
    master.indeterminate = shownSelected > 0 && shownSelected < shown.length;
  }
  const delBtn = document.getElementById('bulk-delete');
  if (delBtn) delBtn.disabled = n === 0;
}

function deleteSelected() {
  const ids = [...selectedIds];
  if (ids.length === 0) return;
  if (!confirm(`Delete ${ids.length} selected contact${ids.length === 1 ? '' : 's'} and all their interviews? This cannot be undone.`)) return;
  const idSet = new Set(ids);
  state.contacts = state.contacts.filter(c => !idSet.has(c.id));
  selectedIds.clear();
  save();
  rerenderContacts();
  showToast(`${ids.length} contact${ids.length === 1 ? '' : 's'} deleted`);
}

function deleteAllContacts() {
  const total = (state.contacts || []).length;
  if (total === 0) return;
  if (!confirm(`Delete ALL ${total} contacts and every interview attached to them? This cannot be undone.`)) return;
  if (!confirm(`Are you absolutely sure? This permanently removes all ${total} contacts.`)) return;
  state.contacts = [];
  selectedIds.clear();
  save();
  rerenderContacts();
  showToast('All contacts deleted');
}

function selectAllShown(on) {
  const shown = filteredContacts();
  for (const c of shown) { if (on) selectedIds.add(c.id); else selectedIds.delete(c.id); }
  rerenderContacts();
}

/* Left-edge "drag a card here to delete" drop zone (pipeline view). */
function showDeleteZone(on) {
  const dz = document.getElementById('delete-zone');
  if (!dz) return;
  dz.classList.toggle('show', !!on);
  if (!on) dz.classList.remove('armed');
}
function wireDeleteZone() {
  const dz = document.getElementById('delete-zone');
  if (!dz || dz._wired) return;
  dz._wired = true;
  dz.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; dz.classList.add('armed'); });
  dz.addEventListener('dragleave', e => { if (!dz.contains(e.relatedTarget)) dz.classList.remove('armed'); });
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('armed');
    showDeleteZone(false);
    const id = e.dataTransfer.getData('text/plain');
    if (id) deleteContact(id);
  });
}

/* ============================================================
   AI EXTRACTION (Claude API) — preserved
   ============================================================ */
async function callClaude(apiKey, model, prompt, maxTokens) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true', 'content-type': 'application/json' },
    body: JSON.stringify({ model, max_tokens: maxTokens || 2048, messages: [{ role: 'user', content: prompt }] })
  });
  if (!res.ok) {
    let detail = '';
    try { const j = await res.json(); detail = ' — ' + (j.error?.message || JSON.stringify(j.error || j)); } catch {}
    throw new Error(`HTTP ${res.status}${detail}`);
  }
  const data = await res.json();
  return data.content?.[0]?.text || '';
}

async function extractFromTranscript(transcript) {
  const apiKey = state.aiSettings?.apiKey;
  const model = state.aiSettings?.model || 'claude-haiku-4-5-20251001';
  if (!apiKey) throw new Error('No API key set — go to Settings → AI extraction');
  const prompt = `You are a rigorous customer discovery analyst trained in three methodologies:
- THE MOM TEST (Rob Fitzpatrick): real pain shows up as past behavior, not hypotheticals. Compliments don't count. "I would totally pay for that" doesn't count. Workaround behavior and specific past events DO count.
- LEAN STARTUP (Eric Ries): validated learning means evidence, not opinions. Strong pain has frequency, intensity, and economic impact.
- TRACTION (Weinberg & Mares): commercially viable pain is recurring, costly, and the customer is already trying to solve it (or willing to pay).

Read the interview transcript below and produce THREE outputs:

═══ 1. VALIDATED PAIN POINTS ═══
A pain qualifies as VALIDATED ONLY if at least one of these is true in the transcript:
  ✓ The interviewee describes a specific past instance ("last Tuesday…", "two weeks ago…", "every Friday I…")
  ✓ They describe an active workaround they're already doing (cobbled-together solution, spreadsheet, hired person, etc.)
  ✓ They mention money or time spent dealing with it ($X/mo, Y hours/week)
  ✓ They mention having tried other solutions
  ✓ They show strong emotional response (frustration, anger, anxiety) about a concrete situation

Score each validated pain:
  - "strong" = multiple validation signals present (e.g. specific past event AND workaround AND $/hours quantified)
  - "medium" = one clear signal present (specific event OR workaround)
  - "weak" = signal is present but mild (frustration mentioned but no specific event/workaround)

Tag relevant signals from this set: ["frequent", "intense", "costly", "active_workaround", "tried_solutions", "specific_past_event", "emotional"]

═══ 2. RED FLAGS — failed Mom Test ═══
Things the interviewee said that SOUND like pains but fail validation. These must NOT be treated as real customer signal. Common patterns:
  ✗ Hypotheticals: "It would be cool if…", "I would totally use that"
  ✗ Compliments: "Yeah that sounds great", "That's a problem for sure"
  ✗ Vague agreement to leading questions without specifics
  ✗ Future-tense intentions ("I'm going to start doing X")
  ✗ Pains they acknowledged but show no behavior around (haven't tried to solve, no money/time spent)

For each red flag, name what was claimed and why it fails Mom Test.

═══ 3. VERBATIM LANGUAGE ═══
Direct word-for-word quotes from the interviewee (NOT the interviewer) that:
  - Describe a real pain in their own words
  - Use distinctive, memorable phrasing
  - Could become marketing copy or interview script language
Must be exact quotes — no paraphrasing.

Return ONLY valid JSON in exactly this format, no other text:
{
  "validatedPains": [
    {
      "pain": "Concise description of the pain",
      "evidence": "Specific past instance, workaround, or quantified cost they mentioned",
      "momTestScore": "strong",
      "signals": ["specific_past_event", "active_workaround", "costly"]
    }
  ],
  "redFlags": [
    {
      "claim": "What the interviewee said that sounded like a pain",
      "issue": "Why it fails Mom Test (hypothetical / compliment / vague / no behavior shown)"
    }
  ],
  "language": ["Direct quote one", "Direct quote two"]
}

Be ruthless. A 30-minute transcript typically yields 2-5 validated pains, 2-6 red flags, and 4-8 quotes. Better to surface fewer truly validated pains than many weak ones — that's the whole point of the Mom Test.

Transcript:
"""

  const responseText = await callClaude(apiKey, model, prompt, 4096);
  let jsonText = responseText.trim();
  const codeBlockMatch = jsonText.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
  if (codeBlockMatch) jsonText = codeBlockMatch[1];
  const braceMatch = jsonText.match(/\{[\s\S]*\}/);
  if (braceMatch) jsonText = braceMatch[0];
  let parsed;
  try { parsed = JSON.parse(jsonText); }
  catch (e) { throw new Error('Claude returned a response I couldn\'t parse. Raw response: ' + responseText.slice(0, 200)); }
  if (!Array.isArray(parsed.validatedPains)) {
    parsed.validatedPains = Array.isArray(parsed.painPoints)
      ? parsed.painPoints.map(p => typeof p === 'string' ? { pain: p, evidence: '', momTestScore: 'medium', signals: [] } : p) : [];
  }
  if (!Array.isArray(parsed.redFlags)) parsed.redFlags = [];
  if (!Array.isArray(parsed.language)) parsed.language = [];
  parsed.validatedPains = parsed.validatedPains.map(p => ({
    pain: p.pain || '', evidence: p.evidence || '',
    momTestScore: ['strong', 'medium', 'weak'].includes(p.momTestScore) ? p.momTestScore : 'medium',
    signals: Array.isArray(p.signals) ? p.signals : []
  })).filter(p => p.pain);
  return parsed;
}

function showExtractionResult(result, contact, interview) {
  const validatedHtml = result.validatedPains.length
    ? result.validatedPains.map(p => `
        <div class="validated-pain">

            <div class="pain-text">${escapeHtml(p.pain)}</div>
            <span class="badge badge-${p.momTestScore}">${escapeHtml(p.momTestScore)}</span>
          </div>
          ${p.evidence ? `<div class="evidence">↳ ${escapeHtml(p.evidence)}</div>` : ''}
          ${p.signals?.length ? `<div class="signals">${p.signals.map(s => `<span class="signal-tag">${escapeHtml(s.replace(/_/g, ' '))}</span>`).join('')}</div>` : ''}
        </div>`).join('')
    : '<p class="section-note">(Nothing passed Mom Test validation. That itself is a useful signal — the interview may have been too hypothetical, or the customer may not have this pain strongly.)</p>';
  const redFlagsHtml = result.redFlags.length
    ? result.redFlags.map(rf => `<div class="red-flag"><div class="claim">"${escapeHtml(rf.claim)}"</div><div class="issue">↳ ${escapeHtml(rf.issue)}</div></div>`).join('') : '';
  const quotesHtml = result.language.length
    ? result.language.map(q => `<div class="quote-item">"${escapeHtml(q)}"</div>`).join('') : '<p class="section-note">(No standout quotes extracted)</p>';
  const strongCount = result.validatedPains.filter(p => p.momTestScore === 'strong').length;
  const mediumCount = result.validatedPains.filter(p => p.momTestScore === 'medium').length;
  const weakCount = result.validatedPains.filter(p => p.momTestScore === 'weak').length;
  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <h2>✨ Mom Test extraction · ${escapeHtml(interview.date || '')}</h2>
      <button class="btn tiny" id="ex-close">Close</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--muted);font-size:13px;margin-top:0">
        Analyzed via <strong>Mom Test</strong>, <strong>Lean Startup</strong>, and <strong>Traction</strong>.
        ${strongCount ? `<span class="badge badge-strong" style="margin-left:6px">${strongCount} strong</span>` : ''}
        ${mediumCount ? `<span class="badge badge-medium" style="margin-left:6px">${mediumCount} medium</span>` : ''}
        ${weakCount ? `<span class="badge badge-weak" style="margin-left:6px">${weakCount} weak</span>` : ''}
        ${result.redFlags.length ? `<span class="badge" style="background:#fdecea;color:#c62828;margin-left:6px">${result.redFlags.length} red flag${result.redFlags.length === 1 ? '' : 's'}</span>` : ''}
      </p>
      <div class="extract-result"><h4>✅ Validated pain points (${result.validatedPains.length})</h4><p class="section-note">These show specific past behavior, active workarounds, or measurable cost.</p>${validatedHtml}</div>
      ${result.redFlags.length ? `<div class="extract-result red-flags-panel"><h4>⚠ Red flags — failed Mom Test (${result.redFlags.length})</h4><p class="section-note">Sounded like pains but lack validation. Do NOT treat as real signal.</p>${redFlagsHtml}</div>` : ''}
      <div class="extract-result quotes-panel"><h4>💬 Verbatim quotes (${result.language.length})</h4><p class="section-note">Word-for-word — raw material for marketing copy and pitch language.</p>${quotesHtml}</div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="ex-cancel">Cancel</button>
      <button class="btn" id="ex-append">Append to existing</button>
      <button class="btn primary" id="ex-replace">Replace existing fields</button>
    </div>`;
  document.getElementById('modal-back').classList.add('show');
  const ppLines = result.validatedPains.map(p => {
    const tag = p.momTestScore.toUpperCase();
    const sigs = p.signals?.length ? ' · ' + p.signals.map(s => s.replace(/_/g, ' ')).join(', ') : '';
    let block = `• [${tag}${sigs}] ${p.pain}`;
    if (p.evidence) block += `\n    ↳ Evidence: ${p.evidence}`;
    return block;
  }).join('\n\n');
  const lgLines = result.language.map(q => '• "' + q + '"').join('\n');
  const redFlagsBlock = result.redFlags.length
    ? '⚠ Red flags (failed Mom Test — do NOT treat as validated customer signal):\n' + result.redFlags.map(rf => `• "${rf.claim}" — ${rf.issue}`).join('\n') : '';
  const apply = (mode) => {
    if (mode === 'replace') {
      interview.painPoints = ppLines; interview.language = lgLines;
      if (redFlagsBlock) interview.notes = redFlagsBlock + (interview.notes ? '\n\n---\n\n' + interview.notes : '');
    } else if (mode === 'append') {
      interview.painPoints = (interview.painPoints || '') + (interview.painPoints && ppLines ? '\n\n' : '') + ppLines;
      interview.language = (interview.language || '') + (interview.language && lgLines ? '\n' : '') + lgLines;
      if (redFlagsBlock) interview.notes = (interview.notes || '') + (interview.notes ? '\n\n' : '') + redFlagsBlock;
    }
    contact.updatedAt = new Date().toISOString(); save(); renderContactDetail();
    showToast(mode === 'replace' ? 'Fields replaced with extracted content' : 'Extracted content appended');
  };
  document.getElementById('ex-close').addEventListener('click', closeExtractModal);
  document.getElementById('ex-cancel').addEventListener('click', closeExtractModal);
  document.getElementById('ex-replace').addEventListener('click', () => apply('replace'));
  document.getElementById('ex-append').addEventListener('click', () => apply('append'));
}

function wireDetailHandlers(c) {

  document.querySelectorAll('[data-iv-action="extract"]').forEach(b => b.addEventListener('click', async () => {
    const iv = c.interviews.find(x => x.id === b.dataset.ivId);
    if (!iv || !iv.transcript || !iv.transcript.trim()) { showToast('Paste a transcript first'); return; }

function summarizeReactionerForName(data, name) {
  const target = name.trim().toLowerCase();
  const scoreMap = (data && data.scoreMap) || { love: 3, like: 1, dislike: -1 };
  let love = 0, like = 0, dislike = 0, total = 0, score = 0;
  const cyclesSeen = [];
  (data.cycles || []).forEach(cy => {
    const matched = (cy.participants || []).filter(p => (p.name || '').trim().toLowerCase() === target);
    if (!matched.length) return;
    let cycleCount = 0;
    matched.forEach(p => {
      Object.keys(cy.reactions || {}).forEach(k => {
        if (k.split('|')[0] !== p.id) return;
        const r = cy.reactions[k]; if (!r || !r.reaction) return;
        total++; cycleCount++;
        if (r.reaction === 'love') love++; else if (r.reaction === 'like') like++; else if (r.reaction === 'dislike') dislike++;
        score += (scoreMap[r.reaction] || 0);
      });
    });
    if (cycleCount > 0) cyclesSeen.push(cy.name || 'Cycle');
  });
  return { love, like, dislike, total, score, cycles: cyclesSeen };
}
async function pullReactionsFor(c) {
  if (!sb || !currentUserId) { alert('Pull reactions reads your Reactioner data from the same account, so you need to be signed in (cloud sync). Sign in and try again.'); return; }
  const name = (c.name || '').trim();
  if (!name) { alert('Add a name to this contact first — reactions are matched by participant name in the Reactioner.'); return; }
  showToast('Reading your Reactioner data…');
  let row;
  try { row = await cloudLoadReactioner(currentUserId); }
  catch (e) { alert('Could not read Reactioner data: ' + (e.message || e)); return; }
  if (!row || !row.data || !Array.isArray(row.data.cycles)) { alert('No Reactioner data found in this account yet. Run an interview in the Reactioner first.'); return; }
  const summary = summarizeReactionerForName(row.data, name);
  if (!summary || summary.total === 0) {
    alert('No reactions found for a participant named "' + name + '" in your Reactioner.\n\nTip: use the 🎤 Reaction interview button — it pre-fills the participant name so the match works automatically.');
    return;
  }
  const today = new Date().toISOString().slice(0, 10);
  c.interviews = c.interviews || [];
  let iv = c.interviews.find(x => x.source === 'reactioner' && x.date === today);
  if (!iv) { iv = defaultInterview(); iv.date = today; iv.source = 'reactioner'; c.interviews.unshift(iv); }
  iv.reactionSummary = summary;
  const verdict = summary.score > 0 ? 'Resonated' : summary.score < 0 ? 'Did not land' : 'Mixed';
  const block = 'Reactioner results (' + (summary.cycles.join(', ') || 'cycle') + '): ❤️ ' + summary.love + '  👍 ' + summary.like + '  👎 ' + summary.dislike
    + '  ·  ' + summary.total + ' reactions  ·  net score ' + summary.score + ' (' + verdict + ')';
  iv.notes = block + (iv.notes && iv.notes.indexOf('Reactioner results') === -1 ? '\n\n' + iv.notes : '');
  if (['not-contacted', 'contacted', 'scheduled'].includes(c.stage)) c.stage = 'talked-to';

}

${text}

function exportCsv() {

function csvEscape(v) { if (v === null || v === undefined) return ''; const s = String(v); if (s.includes(',') || s.includes('"') || s.includes('\n')) return '"' + s.replace(/"/g, '""') + '"'; return s; }
function parseCsv(text) {

window.addEventListener('dragleave', e => { if (!hasFiles(e)) return; dragDepth = Math.max(0, dragDepth - 1); if (dragDepth === 0) showDropOverlay(false); });
window.addEventListener('drop', async e => {
  if (!hasFiles(e)) return;
  e.preventDefault(); dragDepth = 0; showDropOverlay(false);
  const file = e.dataTransfer.files[0]; if (!file) return;
  const name = (file.name || '').toLowerCase();
  const txt = await file.text();
  if (name.endsWith('.json')) {
    try {
      const data = JSON.parse(txt);
      if (data && Array.isArray(data.contacts) && data.contacts.length && data.contacts[0] && data.contacts[0].id) { importJson(txt); return; }
    } catch (e) {}
    const contacts = parseContactsDirectly(txt);
    if (contacts && contacts.length) { showAiImportPreview(contacts, txt); } else { importJson(txt); }
  } else if (name.endsWith('.csv')) {
    const contacts = parseContactsDirectly(txt);
    if (contacts && contacts.length) showAiImportPreview(contacts, txt); else importCsv(txt);
  } else { showToast('Drop a .csv or .json file'); }
});

const OUTREACH_STATUSES = [

/* ---- AI personalization (optional, via callClaude) ---- */
function ovAIPrompt(c, key) {

  const p = ovPersonaCfg(key);
  const ctx = JSON.stringify({
    firstName: ovFirstName(c), name: c.name || '', company: c.company || '', role: c.role || '',

async function ovGenerateAI(c) {

  const codeBlockMatch = jsonText.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
  if (codeBlockMatch) jsonText = codeBlockMatch[1];

    textDraft: String(parsed.textDraft || '').trim(),

/* ---- time + status helpers ---- */
function ovDaysSince(isoDate) {
  if (!isoDate) return Infinity;
  const then = new Date(isoDate);
  if (isNaN(then.getTime())) return Infinity;
  return Math.floor((Date.now() - then.getTime()) / 86400000);
}
function ovLastTouch(c) {
  const o = ensureOutreach(c);

  return last;

function ovFollowupDue(c) {

function ovCounts() {
  const out = { not_contacted: 0, contacted: 0, replied: 0, booked: 0, no_response: 0, followup_due: 0 };
  (state.contacts || []).forEach(c => {
    const o = ensureOutreach(c);

  const order = { culinary: 0, realestate: 1 };
  return (state.contacts || []).filter(c => ensureOutreach(c).status === 'not_contacted')
    .sort((a, b) => {
      const ca = ovHasChannel(a), cb = ovHasChannel(b);
      if (ca !== cb) return cb - ca;
      const pa = order[ovPersonaKey(a)] !== undefined ? order[ovPersonaKey(a)] : 9;
      const pb = order[ovPersonaKey(b)] !== undefined ? order[ovPersonaKey(b)] : 9;

function ovDownloadDaysheet() {
  const text = ovDaysheetText();
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'outreach-daysheet-' + new Date().toISOString().slice(0, 10) + '.txt';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  showToast('Day-sheet downloaded');
}
function ovAnalytics() {
  const rows = { persona: {}, channel: {} };
  function bump(map, key, field) { if (!map[key]) map[key] = { contacted: 0, replied: 0, booked: 0 }; map[key][field]++; }
  (state.contacts || []).forEach(c => {
    const o = ensureOutreach(c);
    if (o.status === 'not_contacted') return;
    const pk = ovPersonaKey(c);
    const ch = o.channel || ovDefaultChannel(c);
    bump(rows.persona, pk, 'contacted'); bump(rows.channel, ch, 'contacted');
    if (o.status === 'replied' || o.status === 'booked') { bump(rows.persona, pk, 'replied'); bump(rows.channel, ch, 'replied'); }
    if (o.status === 'booked') { bump(rows.persona, pk, 'booked'); bump(rows.channel, ch, 'booked'); }
  });
  return rows;
}
function ovOpenReactionerFor(id) {
  const c = (state.contacts || []).find(x => x.id === id);
  if (c) launchReactionInterview(c);
}

/* ---- mutations ---- */
function ovMarkContacted(id, channel) {
  const c = (state.contacts || []).find(x => x.id === id); if (!c) return;
  const o = ensureOutreach(c);
  o.status = 'contacted';
  o.channel = channel || o.channel || ovDefaultChannel(c);
  o.dateContacted = new Date().toISOString().slice(0, 10);
  if (c.stage === 'not-contacted') c.stage = 'contacted';
  c.updatedAt = new Date().toISOString();
  save();
  renderOutreach();
  if (state.activeView === 'pipeline') renderPipeline();
  showToast('Marked contacted — moved into follow-up tracking');
}
function ovApplyStatus(id, to) {
  const c = (state.contacts || []).find(x => x.id === id); if (!c) return;
  const o = ensureOutreach(c);
  if (to === 'replied') { o.status = 'replied'; }
  else if (to === 'booked') {
    o.status = 'booked';
    if (c.stage === 'not-contacted' || c.stage === 'contacted') c.stage = 'scheduled';
  }
  else if (to === 'no_response') { o.status = 'no_response'; }
  else if (to === 'requeue') { o.status = 'not_contacted'; o.dateContacted = ''; o.followups = []; }
  else if (to === 'contacted') { return ovMarkContacted(id, o.channel || ovDefaultChannel(c)); }
  c.updatedAt = new Date().toISOString();
  save();
  renderOutreach();
  if (state.activeView === 'pipeline') renderPipeline();
  showToast('Outreach updated');
}
function ovLogFollowup(id) {
  const c = (state.contacts || []).find(x => x.id === id); if (!c) return;
  const o = ensureOutreach(c);
  o.followups = o.followups || [];
  o.followups.push({ date: new Date().toISOString().slice(0, 10), channel: o.channel || ovDefaultChannel(c) });
  c.updatedAt = new Date().toISOString();
  save();
  renderOutreach();
  showToast('Follow-up logged — reminder timer reset');
}
function ovSetPersona(id, persona) {
  const c = (state.contacts || []).find(x => x.id === id); if (!c) return;
  const o = ensureOutreach(c);
  o.persona = (persona === 'culinary' || persona === 'realestate') ? persona : '';
  c.updatedAt = new Date().toISOString();
  save();
  renderOutreach();
}
function ovSetChannel(id, channel) {
  const c = (state.contacts || []).find(x => x.id === id); if (!c) return;
  const o = ensureOutreach(c);
  o.channel = (channel === 'ig' || channel === 'text') ? channel : '';
  c.updatedAt = new Date().toISOString();
  save();
  renderOutreach();
}

/* ---- copy-to-clipboard (frictionless) ---- */
function ovCopyValue(text, btn) {
  const done = () => {
    if (btn) { const orig = btn.dataset.label || btn.textContent; btn.dataset.label = orig; btn.textContent = '✓ Copied!'; setTimeout(() => { btn.textContent = orig; }, 1500); }
    showToast('Message copied — paste it into your phone or Instagram');
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done, () => ovCopyFallback(text, done));
  } else { ovCopyFallback(text, done); }
}
function ovCopyFallback(text, done) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); ta.remove();
    if (done) done();
  } catch (e) { showToast('Copy failed — select the text and copy manually'); }
}

function ovAnalyticsSectionHtml() {
  const a = ovAnalytics();
  const totalContacted = (state.contacts || []).filter(c => ensureOutreach(c).status !== 'not_contacted').length;
  if (totalContacted === 0) {
    return `<div class="ov-card ov-empty"><div class="big-icon">📈</div><h3>No outreach data yet</h3>
      <p>Once you've contacted a few people and logged replies and bookings, you'll see which persona and channel book the most interviews.</p></div>`;
  }
  function tbl(map, head) {
    const keys = Object.keys(map);
    if (!keys.length) return '';
    const rows = keys.map(k => {
      const r = map[k];
      const rr = r.contacted ? Math.round(r.replied / r.contacted * 100) : 0;
      const br = r.contacted ? Math.round(r.booked / r.contacted * 100) : 0;
      const label = (head === 'Persona')
        ? (k === 'realestate' ? '🏠 Real estate' : '🍴 Culinary')
        : (k === 'ig' ? '📷 Instagram DM' : '📱 Text');
      return `<tr><td><strong>${label}</strong></td><td>${r.contacted}</td><td>${r.replied}</td><td>${r.booked}</td><td>${rr}%</td><td>${br}%</td></tr>`;
    }).join('');
    return `<div class="ov-section-head" style="margin-top:8px"><h3>By ${head.toLowerCase()}</h3></div>
      <div class="list-table-wrap" style="margin-bottom:6px"><table class="list"><thead><tr><th>${head}</th><th>Contacted</th><th>Replied</th><th>Booked</th><th>Reply rate</th><th>Book rate</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }
  function bestOf(map) {
    let best = null;
    Object.keys(map).forEach(k => {
      const r = map[k]; if (r.contacted < 3) return;
      const br = r.booked / r.contacted;
      if (!best || br > best.br) best = { k, br };
    });
    return best;
  }
  const bp = bestOf(a.persona), bc = bestOf(a.channel);
  const bits = [];
  if (bp) bits.push(`${bp.k === 'realestate' ? 'real-estate' : 'culinary'} outreach books at ${Math.round(bp.br * 100)}%`);
  if (bc) bits.push(`${bc.k === 'ig' ? 'Instagram DMs' : 'texts'} book at ${Math.round(bc.br * 100)}%`);
  const callout = bits.length ? `<div class="ov-hint">📊 So far, ${bits.join(' and ')}. (Groups with fewer than 3 contacted are excluded as too small to read into.)</div>` : '';
  return callout + tbl(a.persona, 'Persona') + tbl(a.channel, 'Channel');
}
